name: Build & Update README

on:
  push:
    branches: [dev, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: colonycraft-mod
          path: build/libs/*.jar

      - name: Update README stats
        run: |
          JOBS=$(grep -c "^    [A-Z_]*(" src/main/java/cz/wux/colonycraft/data/ColonistJob.java 2>/dev/null || echo "27")
          BLOCKS=$(ls src/main/resources/assets/colonycraft/models/block/*.json 2>/dev/null | wc -l)
          ITEMS=$(ls src/main/resources/assets/colonycraft/items/*.json 2>/dev/null | wc -l)
          RECIPES=$(ls src/main/resources/data/colonycraft/recipe/*.json 2>/dev/null | wc -l)
          SOURCES=$(find src -name "*.java" | wc -l)
          TEXTURES=$(find src/main/resources/assets/colonycraft/textures -name "*.png" | wc -l)
          
          # Update the auto-generated stats section in README
          sed -i "/<!-- AUTO-GENERATED STATS/,/<!-- END AUTO-GENERATED STATS -->/c\\
          <!-- AUTO-GENERATED STATS - DO NOT EDIT BELOW -->\n\
          ## 📊 Mod Statistics\n\
          \n\
          | Metric | Count |\n\
          |---|---|\n\
          | Job Types | $JOBS |\n\
          | Block Types | $BLOCKS |\n\
          | Item Types | $ITEMS |\n\
          | Recipe Files | $RECIPES |\n\
          | Source Files | ~$SOURCES |\n\
          | Textures | $TEXTURES |\n\
          \n\
          *Auto-updated on $(date -u +%Y-%m-%d) by GitHub Actions.*\n\
          <!-- END AUTO-GENERATED STATS -->" README.md

      - name: Commit README changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "📊 Auto-update README stats [skip ci]"
          git push
